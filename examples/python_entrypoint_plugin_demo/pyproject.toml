[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "spiraltorch-entrypoint-plugin-demo"
version = "0.0.1"
description = "Demo plugin registered via Python entry_points for SpiralTorch"
readme = "README.md"
license = { text = "AGPL-3.0-or-later" }
requires-python = ">=3.10"
dependencies = ["spiraltorch"]

[project.entry-points."spiraltorch.plugins"]
demo_entrypoint_plugin = "spiraltorch_entrypoint_demo:plugin"

[tool.setuptools.packages.find]
where = ["src"]
