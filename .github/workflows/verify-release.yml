name: Verify Official Release Integrity

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to verify (leave empty to verify the latest release)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  verify:
    name: Validate signed release assets
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sigstore==4.1.* requests==2.*
      - name: Verify official release bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG_ARG=""
          if [ -n "${RELEASE_TAG:-}" ]; then
            TAG_ARG="--tag ${RELEASE_TAG}"
          fi
          RECOVERY_REF_ARG=""
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            RECOVERY_REF_ARG="--allow-workflow-dispatch-ref refs/heads/main"
          fi
          python scripts/security/verify_release.py ${TAG_ARG} ${RECOVERY_REF_ARG} --repo "${REPOSITORY}"
