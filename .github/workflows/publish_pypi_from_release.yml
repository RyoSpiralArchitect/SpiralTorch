name: Publish PyPI From Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag whose signed wheels should be published"
        required: true
      expected_wheels:
        description: "Number of wheel files expected in the release payload"
        required: false
        default: "3"
      skip_existing:
        description: "Allow reruns when one or more files are already on PyPI"
        required: false
        default: "true"
      publish_method:
        description: "PyPI authentication method: dry-run validates only; token/trusted upload"
        required: false
        type: choice
        options:
          - dry-run
          - token
          - trusted
        default: "dry-run"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish release wheels to PyPI
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/spiraltorch
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      EXPECTED_WHEELS: ${{ inputs.expected_wheels }}
      PUBLISH_METHOD: ${{ inputs.publish_method }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      SKIP_EXISTING: ${{ inputs.skip_existing }}
    steps:
      - name: Validate PyPI publish method
        run: |
          set -euo pipefail
          case "$PUBLISH_METHOD" in
            token)
              if [ -z "$PYPI_API_TOKEN" ]; then
                echo "publish_method=token requires a PYPI_API_TOKEN repository or environment secret." >&2
                exit 1
              fi
              ;;
            trusted)
              echo "publish_method=trusted selected."
              echo "PyPI must define a trusted publisher for repo=$GITHUB_REPOSITORY, workflow=publish_pypi_from_release.yml, environment=pypi."
              ;;
            dry-run)
              echo "publish_method=dry-run selected; release wheels will be validated but not uploaded."
              ;;
            *)
              echo "Unknown publish_method: $PUBLISH_METHOD" >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download GitHub Release wheels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-dist
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-dist \
            --pattern '*.whl' \
            --pattern 'wheels.sha256'
          find release-dist -maxdepth 1 -type f -print | sort

      - name: Verify release checksums
        run: |
          set -euo pipefail
          cd release-dist
          test -f wheels.sha256
          wheel_count="$(find . -maxdepth 1 -type f -name '*.whl' | wc -l | tr -d ' ')"
          if [ "$wheel_count" != "$EXPECTED_WHEELS" ]; then
            echo "Expected $EXPECTED_WHEELS wheel(s), found $wheel_count" >&2
            exit 1
          fi
          sha256sum --check wheels.sha256

      - name: Validate wheel metadata
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip twine
          python -m twine check release-dist/*.whl
          python - <<'PY'
          import os
          import zipfile
          from email.parser import Parser
          from pathlib import Path

          expected = os.environ["RELEASE_TAG"].lstrip("v")
          required_payloads = {
              "spiraltorch/__init__.pyi",
              "spiraltorch/py.typed",
              "spiraltorch/spiralk.pyi",
          }
          for wheel in sorted(Path("release-dist").glob("*.whl")):
              with zipfile.ZipFile(wheel) as archive:
                  names = set(archive.namelist())
                  metadata_names = [
                      name for name in names
                      if name.endswith(".dist-info/METADATA")
                  ]
                  if len(metadata_names) != 1:
                      raise SystemExit(f"{wheel.name}: expected one METADATA file, found {len(metadata_names)}")
                  missing_payloads = sorted(required_payloads - names)
                  if missing_payloads:
                      raise SystemExit(
                          f"{wheel.name}: missing required type payloads: {', '.join(missing_payloads)}"
                      )
                  metadata = Parser().parsestr(archive.read(metadata_names[0]).decode("utf-8"))
              actual = metadata.get("Version")
              if actual != expected:
                  raise SystemExit(f"{wheel.name}: expected version {expected}, found {actual}")
              print(f"{wheel.name}: version={actual} type_payloads={len(required_payloads)}")
          PY
          mkdir -p pypi-dist
          cp release-dist/*.whl pypi-dist/

      - name: Dry-run release publish preflight
        if: inputs.publish_method == 'dry-run'
        run: |
          set -euo pipefail
          python scripts/release_status.py \
            --version "${RELEASE_TAG#v}" \
            --release-tag "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --expected-wheels "$EXPECTED_WHEELS" \
            --dist release-dist \
            --no-clipboard
          python scripts/publish_pypi_wheels.py \
            --dist release-dist \
            --expected-version "${RELEASE_TAG#v}" \
            --github-release-tag "$RELEASE_TAG" \
            --github-release-repo "$GITHUB_REPOSITORY" \
            --token-source none \
            --dry-run \
            --no-smoke
          echo "Dry-run completed without uploading to PyPI."

      - name: Publish to PyPI (token)
        if: inputs.publish_method == 'token'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist
          password: ${{ env.PYPI_API_TOKEN }}
          skip-existing: ${{ env.SKIP_EXISTING }}

      - name: Publish to PyPI (trusted publishing)
        if: inputs.publish_method == 'trusted'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist
          skip-existing: ${{ env.SKIP_EXISTING }}

      - name: Verify PyPI release and smoke install
        if: inputs.publish_method != 'dry-run'
        run: |
          set -euo pipefail
          python scripts/security/verify_pypi_release.py \
            --version "${RELEASE_TAG#v}" \
            --release-tag "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --expected-wheels "$EXPECTED_WHEELS" \
            --timeout 240

          smoke_dir="$RUNNER_TEMP/spiraltorch-pypi-smoke"
          run_dir="$RUNNER_TEMP/spiraltorch-pypi-smoke-cwd"
          rm -rf "$smoke_dir" "$run_dir"
          mkdir -p "$smoke_dir" "$run_dir"
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --only-binary=:all: --target "$smoke_dir" "spiraltorch==${RELEASE_TAG#v}"
          cd "$run_dir"
          EXPECTED_VERSION="${RELEASE_TAG#v}" PYTHONPATH="$smoke_dir" python -P - <<'PY'
          import os
          import spiraltorch as st

          assert st.__version__ == os.environ["EXPECTED_VERSION"]
          layer = st.nn.Linear(2, 2, name="pypi_workflow_smoke")
          state = dict(layer.state_dict())
          assert "pypi_workflow_smoke::weight" in state
          print("pypi workflow smoke ok", st.__version__)
          PY
