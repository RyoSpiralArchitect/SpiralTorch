name: CI
on:
  push:
    branches: [ main ]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  version-consistency:
    name: bindings/st-py version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: pyproject.toml ↔ Cargo.toml version match
        run: bash scripts/check_version_consistency.sh

  build-test:
    name: build & test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu / stable
            os: ubuntu-latest
            toolchain: stable
            run_lints: false
            run_upper_stack: true
          - name: ubuntu / lint
            os: ubuntu-latest
            toolchain: stable
            run_lints: true
            run_upper_stack: false
          - name: macos / stable
            os: macos-latest
            toolchain: stable
            run_lints: false
            run_upper_stack: false
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.run_lints
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev protobuf-compiler
      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest' && matrix.run_lints
        run: |
          if ! command -v protoc >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install protobuf
          fi
      - name: rustfmt (workspace)
        if: matrix.run_lints
        run: |
          rustup toolchain install nightly-2026-04-15 --profile minimal --component rustfmt
          cargo +nightly-2026-04-15 fmt --all -- --check
      - name: CPU feature isolation
        if: matrix.run_lints
        run: bash scripts/check_cpu_feature_isolation.sh
      - name: clippy (workspace)
        if: matrix.run_lints
        run: cargo clippy --workspace --all-targets
      - name: clippy (strict subset)
        if: matrix.run_lints
        run: bash scripts/run_rust_clippy_strict.sh
      - name: build + test core
        run: |
          cargo build -p st-core --release
          cargo test  -p st-core --release -- --nocapture
      - name: build upper stack
        if: matrix.run_upper_stack
        run: |
          cargo build -p st-nn --release
          cargo build -p st-spiral-rl --release
          cargo build -p st-rec --release

  windows-core:
    name: build & test core (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: build + test core
        run: |
          cargo build -p st-core --release
          cargo test  -p st-core --release -- --nocapture
  wgpu-macos:
    name: st-tensor (wgpu / macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: build tensor + wgpu
        run: cargo build -p st-tensor --features wgpu --release

  wasm-build:
    name: spiraltorch-wasm (wasm32 build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: build (wasm32)
        run: cargo build -p spiraltorch-wasm --target wasm32-unknown-unknown --release

  python-docs-smoke:
    name: python docs smoke (README + hello_session)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel
        run: |
          python -m pip install -U pip wheel maturin
          maturin build --release --locked -m bindings/st-py/Cargo.toml --features "logic,kdsl"
      - name: Verify wheel archive
        run: |
          python -P - <<'PY'
          from pathlib import Path, PurePosixPath
          from zipfile import ZipFile

          wheels = list(Path("target/wheels").glob("spiraltorch-*.whl"))
          if len(wheels) != 1:
              raise RuntimeError(f"expected exactly one SpiralTorch wheel, found {wheels!r}")

          with ZipFile(wheels[0]) as archive:
              cache_entries = [
                  name
                  for name in archive.namelist()
                  if "__pycache__" in PurePosixPath(name).parts
                  or name.endswith((".pyc", ".pyo"))
              ]
          if cache_entries:
              raise RuntimeError(f"wheel contains Python cache files: {cache_entries!r}")
          print("wheel archive ok")
          PY
      - name: Install wheel
        run: |
          python -m pip install --force-reinstall --no-cache-dir target/wheels/spiraltorch-*.whl
      - name: Sanity-check packaged stubs
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -P - <<'PY'
          import importlib
          import inspect
          import pathlib

          import spiral
          import spiraltorch
          import spiraltorch.spiralk as spiralk

          from spiral import hypergrad_session

          if hypergrad_session.__module__ != "spiral.hypergrad":
              raise RuntimeError("spiral.hypergrad_session is not backed by spiral.hypergrad")

          init_pyi = pathlib.Path(spiraltorch.__file__).resolve().with_name("__init__.pyi")
          py_typed = pathlib.Path(spiraltorch.__file__).resolve().with_name("py.typed")
          spiralk_pyi = pathlib.Path(spiraltorch.__file__).resolve().with_name("spiralk.pyi")

          if not init_pyi.exists():
              raise FileNotFoundError(init_pyi)
          if not py_typed.exists():
              raise FileNotFoundError(py_typed)
          if not spiralk_pyi.exists():
              raise FileNotFoundError(spiralk_pyi)

          stub = init_pyi.read_text(encoding="utf-8")
          for symbol in (
              "HF_TOKENIZED_DATASET_IDENTITY_SCHEMA",
              "hf_tokenized_dataset_identity_report",
              "HF_FINETUNE_TRAINING_RECIPE_IDENTITY_SCHEMA",
              "hf_finetune_training_recipe_identity_report",
              "HF_FINETUNE_REPLAY_IDENTITY_SCHEMA",
              "hf_finetune_replay_identity_report",
          ):
              if symbol not in stub:
                  raise RuntimeError(f"packaged stub is missing {symbol}")

          tokenized = spiraltorch.hf_tokenized_dataset_identity_report(
              train_dataset=[{"input_ids": [1, 2], "labels": [1, 2]}]
          )
          if tokenized.get("status") != "ready":
              raise RuntimeError(f"tokenized dataset identity unavailable: {tokenized!r}")

          recipe = spiraltorch.hf_finetune_training_recipe_identity_report(
              {"learning_rate": 5e-5, "max_steps": 1, "seed": 13},
              model_prepare_report={"mode": "full"},
          )
          if recipe.get("status") != "ready":
              raise RuntimeError(f"training recipe identity unavailable: {recipe!r}")

          def ready_identity(schema, seed, *, field="observed_identity_id"):
              return {
                  "schema": schema,
                  "status": "ready",
                  field: f"sha256:{seed * 64}",
                  "identity_verified": True,
              }

          replay = spiraltorch.hf_finetune_replay_identity_report(
              training_input_identity=ready_identity(
                  "training-input.v1", "1", field="observed_input_id"
              ),
              dataset_input_identity=None,
              dataset_materialization_identity=ready_identity(
                  "materialization.v1", "2"
              ),
              tokenized_dataset_identity=ready_identity("tokenized.v1", "3"),
              model_runtime_identity=ready_identity("runtime.v1", "4"),
              execution_identity=ready_identity("execution.v1", "5"),
              training_recipe_identity=ready_identity("recipe.v1", "6"),
          )
          if replay.get("status") != "ready":
              raise RuntimeError(f"fine-tune replay identity unavailable: {replay!r}")

          submodules = [
              "spiraltorch.psi",
              "spiraltorch.text",
              "spiraltorch.qr",
              "spiraltorch.theory",
              "spiraltorch.julia",
              "spiraltorch.scale_stack",
              "spiraltorch.sot",
              "spiraltorch.rl",
              "spiraltorch.robotics",
          ]
          for name in submodules:
              importlib.import_module(name)

          def assert_reexported(module: str, symbol: str) -> None:
              mod = importlib.import_module(module)
              if hasattr(spiraltorch, symbol) and hasattr(mod, symbol):
                  if getattr(spiraltorch, symbol) is not getattr(mod, symbol):
                      raise RuntimeError(
                          f"{module}.{symbol} is not the same object as spiraltorch.{symbol}"
                      )

          assert_reexported("spiraltorch.psi", "MetaMembConfig")
          assert_reexported("spiraltorch.text", "ContextualPulseFrame")
          assert_reexported("spiraltorch.qr", "QuantumRealityStudio")
          assert_reexported("spiraltorch.theory", "ZRelativityModel")
          assert_reexported("spiraltorch.julia", "ZTigerOptim")
          assert_reexported("spiraltorch.scale_stack", "ScaleStack")
          assert_reexported("spiraltorch.sot", "SoT3DPlan")

          inspect.signature(spiralk.required_blocks)
          print("stubs ok")
          PY
      - name: Run packaged CLI smoke
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          spiral-runtime-preflight --list-presets
          python -P tools/smoke_hf_console_scripts.py
      - name: Run README python blocks
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -P tools/run_readme_python_blocks.py --readme README.md --cwd .
      - name: Run hello_session example
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -P bindings/st-py/examples/hello_session.py
      - name: Run unittest smoke
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -P bindings/st-py/tests/test_unittest_smoke.py
          python -P tests/test_configure_pypi_token_secret.py
          python -P tests/test_llm_char_vae_context_guidance.py
          python -P tests/test_publish_pypi_wheels.py
          python -P tests/test_release_runbook.py
          python -P tests/test_release_status.py
          python -P tests/test_release_workflows.py
          python -P tests/test_run_char_vae_context_chain.py
          python -P tests/test_run_pypi_publish_from_release.py
          python -P tests/test_runtime_imports.py
          python -P tests/test_verify_pypi_release.py
          python -P tools/run_char_vae_context_chain.py models/samples/spiral_corpus_en --preset smoke --run-root /tmp/spiraltorch_char_vae_context_chain_dry --dry-run
      - name: Run extra examples
        env:
          PYTHONNOUSERSITE: "1"
        run: |
          python -P bindings/st-py/examples/canvas_projector_quickstart.py
          python -P bindings/st-py/examples/atlas_quickstart.py
          python -P bindings/st-py/examples/amegagrad_session_quickstart.py --steps 8
          python -P bindings/st-py/examples/canvas_atlas_session_quickstart.py --steps 8
          python -P bindings/st-py/examples/sot_biome_quickstart.py --steps 16 --strict-biome
          python -P bindings/st-py/examples/spiralk_plan_rewrite_quickstart.py
          python -P bindings/st-py/examples/maxwell_spiralk_bridge_quickstart.py --max-samples 32
          python -P bindings/st-py/examples/zspace_stream_training_quickstart.py --steps 25
