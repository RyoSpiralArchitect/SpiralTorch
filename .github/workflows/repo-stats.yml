name: Repository Stats

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: repo-stats
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (for tokei and cargo metadata)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo install
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-tokei-12

      - name: Install tokei
        run: |
          if ! command -v tokei >/dev/null; then
            cargo install tokei --version 12.1.2
          fi
          tokei --version

      - name: Generate badges & update README
        run: |
          python3 tools/gen_repo_stats.py

      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(stats): refresh repository stats [skip ci]"
            git push
          fi
